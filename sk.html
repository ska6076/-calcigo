<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentora — Loading...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cream: {
                            50: '#fffdf9', 100: '#fff8f0', 200: '#ffedd5',
                            300: '#f5dcc0', 400: '#e8c49a', 500: '#c8956a',
                            600: '#92400e', 700: '#78350f',
                        }
                    }
                }
            }
        }

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FAFAFA; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Shimmer Animation */
        .shimmer {
            position: relative;
            background: #f5f5f5;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255,255,255,0.6) 50%,
                transparent 100%
            );
            transform: translateX(-100%);
            animation: shimmer 1.8s infinite;
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* Pulse fallback for older browsers */
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        /* Stagger delays */
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-500 { animation-delay: 0.5s; }

        /* Smooth fade out when ready (optional hook) */
        .skeleton-wrapper {
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .skeleton-wrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="skeleton-wrapper" id="skeleton">

    <!-- Navbar Skeleton -->

            </div>
